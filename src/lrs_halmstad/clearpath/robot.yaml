serial_number: a201-0000
version: 0
system:
  username: lrs
  hosts:
    - hostname: localhost
      ip: 127.0.0.1
      onboard: {}
      remote: {}
  ros2:
    namespace: a201_0000
    domain_id: 3
    rmw_implementation: rmw_fastrtps_cpp
    workspaces: []
platform:
  controller: logitech
  battery:
    model: ES20_12C
    configuration: S2P1
  attachments:
    - name: front_bumper
      type: bumper
      parent: front_bumper_mount
    - name: rear_bumper
      type: bumper
      parent: rear_bumper_mount
    - name: top_plate
      type: top_plate
    - name: sensor_arch
      type: sensor_arch
      parent: default_mount
      enabled: False
  extras:
    urdf: null
    ros_parameters:
      platform_velocity_controller:
        cmd_vel_timeout: 5.0
        linear.x.max_velocity": 1.5
        linear.x.min_velocity": -1.0
        linear.x.max_acceleration": 4.0
        linear.x.min_acceleration": -3.0
        angular.z.max_velocity": 3.0
        angular.z.min_velocity": -2.0
        angular.z.max_acceleration": 8.0
        angular.z.min_acceleration": -6.0
links:
  box: []
  cylinder: []
  frame: []
  mesh: []
  sphere: []
mounts:
  bracket: []
  fath_pivot: []
  riser: []
  disk: []
  post: []
sensors:
  camera:
    - model: intel_realsense
      urdf_enabled: false
      launch_enabled: false
      parent: base_link
      xyz: [0.31, 0.0, 0.23]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        camera:
          camera_name: camera_0
          device_type: d435
          serial_no: 801212070256
          enable_color: true
          rgb_camera.profile: 640,480,30
          enable_depth: true
          depth_module.profile: 640,480,30
          pointcloud.enable: true  
  gps: []
  imu: []
  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.21, 0.13, 0.225]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        urg_node:
          laser_frame_id: lidar2d_0_laser
          ip_address: 192.168.131.20
          ip_port: 10940
          angle_min: -3.141592653589793
          angle_max: 3.141592653589793
