/**:
  ros__parameters:
    camera_x_offset_m: 0.0
    camera_y_offset_m: 0.0
    camera_z_offset_m: 0.27

follow_uav:
  ros__parameters:
    use_sim_time: true

    event_topic: /coord/events
    leader_input_type: odom
    publish_events: false

    d_max: 100.0
    d_target: 7.0
    z_alt: 7.0

    seed_uav_cmd_on_start: true
    startup_nudge_enable: false
    uav_start_x: -2.0
    uav_start_y: 0.0
    uav_start_yaw_deg: 0.0

    min_cmd_period_s: 0.05
    pose_timeout_s: 3.0
    tick_hz: 10.0

    cmd_xy_deadband_m: 0.01
    follow_speed_mps: 5.0
    follow_speed_gain: 2.0
    follow_yaw_rate_rad_s: 5.0
    follow_yaw_rate_gain: 4.0
    smooth_alpha: 1.0
    yaw_deadband_rad: 0.01
    yaw_update_xy_gate_m: 0.0

    quality_conf_good: 0.45
    quality_conf_min: 0.15
    quality_deadband_boost_m: 0.12
    quality_hold_step_scale: 0.08
    quality_latency_ref_ms: 300.0
    quality_min_step_scale: 0.30
    quality_scale_enable: true
    quality_status_timeout_s: 3.0

    state_bad_debounce_ticks: 2
    state_machine_enable: true
    state_ok_debounce_ticks: 2

    estimate_heading_from_motion_enable: false
    estimate_heading_alpha: 1.0
    estimate_heading_max_dt_s: 1.0
    estimate_heading_min_speed_mps: 1.0

    traj_enable: true
    traj_max_accel_mps2: 1.5
    traj_max_speed_mps: 1.0
    traj_pos_gain: 1.6
    traj_quality_min_scale: 0.40
    traj_rel_frame_enable: true
    traj_rel_smooth_alpha: 0.30
    traj_reset_on_yaw_jump_rad: 0.7

camera_tracker:
  ros__parameters:
    use_sim_time: true

    camera_look_target_z_m: 0.0
    default_pan_deg: 0.0
    default_tilt_deg: 0.0
    pan_enable: false
    tilt_enable: true

    pose_timeout_s: 3.0
    tick_hz: 20.0

leader_estimator:
  ros__parameters:
    use_sim_time: true

    estimate_error_topic: /coord/leader_estimate_error
    event_topic: /coord/events
    leader_actual_pose_topic: /a201_0000/platform/odom
    out_topic: /coord/leader_estimate
    publish_events: false
    publish_status: true
    status_topic: /coord/leader_estimate_status

    cam_pitch_offset_deg: 0.0
    cam_yaw_offset_deg: 0.0
    image_timeout_s: 1.0
    uav_pose_timeout_s: 1.0

    device: cpu
    est_hz: 10.0
    imgsz: 640
    latency_comp_enable: true

    conf_threshold: 0.12
    target_class_id: -1
    target_class_name: ""

    constant_range_m: 5.0
    ground_max_range_m: 50.0
    ground_min_range_m: 2.0
    range_mode: ground
    target_ground_z_m: 0.0

    bad_debounce_frames: 2
    bbox_continuity_class_bonus: 0.05
    bbox_continuity_max_px: 400.0
    bbox_continuity_weight: 0.15
    max_bearing_jump_deg: 40.0
    max_hold_frames: 5
    max_hold_s: 0.5
    max_target_speed_mps: 8.0
    max_xy_jump_m: 6.0
    ok_debounce_frames: 2
    smooth_alpha: 0.25
    tracker_enable: true
    xy_smooth_alpha: 0.35

ugv_nav2_driver:
  ros__parameters:
    use_sim_time: true

    continue_on_goal_failure: false
    path_topic: planned_path
    pose_topic: amcl_pose
    pose_topic_type: pose_with_covariance

    initial_pose_covariance_xy: 0.25
    initial_pose_covariance_yaw: 0.068
    initial_pose_frame_id: map
    initial_pose_publish_hz: 1.0
    initial_pose_skip_wait_s: 0.5
    initial_pose_timeout_s: 15.0
    initial_pose_topic: initialpose
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_yaw_deg: 0.0
    set_initial_pose_enable: true

    goal_action_name: navigate_to_pose
    goal_frame_id: map
    goal_reject_retry_count: 5
    goal_reject_retry_delay_s: 1.0
    goal_result_timeout_s: 600.0
    goal_sequence_csv: ""
    goal_sequence_file: ""
    goal_sequence_random_reverse: true
    goal_sequence_randomize: true
    goal_sequence_relative_to_current_pose: false
    goal_sequence_seed: -1
    goal_server_timeout_s: 20.0
    goal_start_delay_s: 2.0
    min_goal_xy_delta_m: 0.05
    min_goal_yaw_delta_deg: 2.0
    pause_after_goal_s: 0.0

    cycles: 2
    forward_speed: 0.75
    forward_time_s: 0.90
    motion_profile: route
    pause_every_n: 0
    pause_time_s: 0.0
    turn_pattern: alternate
    turn_speed: 0.55
    turn_time_s: 0.65
    variation_amplitude: 0.08
    variation_enable: false

    pose_stale_timeout_s: 2.0
    pose_timeout_s: 10.0
    start_delay_s: 0.0

ugv_motion_driver:
  ros__parameters:
    use_sim_time: true

    cmd_topic: /a201_0000/cmd_vel
    ready_check_enable: true
    ready_odom_topic: /a201_0000/platform/odom
    ready_poll_hz: 10.0
    ready_require_cmd_subscriber: true
    ready_require_odom_flow: true
    ready_settle_s: 1.0
    ready_timeout_s: 8.0

    cycles: 120
    forward_speed: 0.75
    forward_time_s: 0.90
    motion_profile: default
    pause_every_n: 0
    pause_time_s: 0.0
    pub_rate_hz: 12.0
    startup_pad_s: 1.5
    start_delay_s: 0.0
    turn_pattern: alternate
    turn_speed: 0.55
    turn_time_s: 0.65
    variation_amplitude: 0.08
    variation_enable: true

    avoid_turn_speed: 0.80
    clear_distance_m: 2.00
    front_sector_deg: 70.0
    min_valid_scan_points: 3
    obstacle_avoid_enable: true
    scan_timeout_s: 0.75
    scan_topic: /a201_0000/sensors/lidar2d_0/scan
    side_sector_max_deg: 100.0
    side_sector_min_deg: 20.0
    stop_distance_m: 1.40
    stop_on_scan_timeout: false
