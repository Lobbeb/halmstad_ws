leader_estimator:
  ros__parameters:
    use_sim_time: true
    out_topic: /coord/leader_estimate
    out_odom_topic: /coord/leader_estimate_odom
    status_topic: /coord/leader_estimate_status
    debug_image_topic: /coord/leader_debug_image
    publish_status: true
    publish_debug_image: true
    debug_draw_all_boxes: true
    debug_show_class_labels: true
    debug_max_boxes: 20
    est_hz: 10.0
    image_timeout_s: 1.5
    uav_pose_timeout_s: 2.0
    constant_range_m: 8.0
    conf_threshold: 0.12
    iou_threshold: 0.45
    target_mode: standard
    target_class_id: -1
    target_class_name: 'robot'
    target_class_names: 'robot'
    target_coco_class_id: -1
    target_coco_class_name: 'cell phone'
    target_coco_class_names: 'traffic light,cell phone,book,suitcase,laptop,remote,kite,motorcycle'
    target_prefer_last_class: true
    target_min_center_v_ratio: 0.0
    target_min_bbox_area_ratio: 0.0005
    target_max_bbox_area_ratio: 0.80
    target_bottom_bias: 0.0
    proxy_center_weight: 0.25
    proxy_center_max_px: 900.0
    proxy_switch_max_px: 300.0
    proxy_switch_min_conf: 0.35
    proxy_switch_force_local: true
    proxy_use_geom_filters: false
    proxy_lock_on_last_enable: true
    proxy_lock_max_px: 240.0
    proxy_lock_min_conf: 0.03
    proxy_lock_dist_weight: 0.50
    proxy_lock_class_bonus: 0.12
    bbox_continuity_weight: 0.30
    bbox_continuity_class_bonus: 0.10
    bbox_continuity_max_px: 350.0
    marker_enable: false
    marker_dictionary: DICT_4X4_50
    marker_id: -1
    marker_size_m: 0.2
    marker_confidence: 0.99
    camera_pan_topic: ''
    camera_tilt_topic: ''
    smooth_alpha: 0.35
    max_hold_frames: 0
    max_hold_s: 10.0
    xy_smooth_alpha: 0.5
    range_mode: auto
    max_xy_jump_m: 10.0
    max_target_speed_mps: 14.0
    max_bearing_jump_deg: 100.0
    ok_debounce_frames: 1
    bad_debounce_frames: 8
    cam_pitch_offset_deg: -70.0
    cam_yaw_offset_deg: 0.0
    cam_z_offset_m: -0.27
    target_ground_z_m: 0.0
    ground_min_range_m: 2.0
    ground_max_range_m: 50.0
    device: cpu
    event_topic: /coord/events
    publish_events: true

follow_uav:
  ros__parameters:
    use_sim_time: true
    uav_backend: setpose
    controller_cmd_topic: ''
    controller_pan_topic: ''
    controller_tilt_topic: ''
    controller_seed_x: -2.0
    controller_seed_y: 0.0
    controller_seed_yaw_deg: 0.0
    controller_publish_gimbal: true
    camera_pose_control_mode: auto
    camera_pose_failover_failures: 12
    camera_lock_enable: true
    camera_lock_gain: 1.0
    camera_lock_deadband_deg: 0.5
    camera_lock_pan_limit_deg: 80.0
    camera_lock_max_step_deg: 8.0
    camera_lock_hold_on_bad_state: true
    camera_lock_tilt_enable: true
    camera_lock_tilt_gain_per_px: 0.045
    camera_lock_tilt_deadband_px: 8.0
    camera_lock_tilt_min_deg: -89.0
    camera_lock_tilt_max_deg: -18.0
    camera_lock_tilt_max_step_deg: 3.5
    camera_lock_tilt_hold_on_bad_state: true
    camera_lock_pan_reset_on_reacquire: false
    camera_lock_search_enable: true
    camera_lock_search_rate_deg_s: 35.0
    camera_lock_search_hold_s: 0.1
    under_target_guard_enable: true
    under_target_err_v_ratio: 0.30
    under_target_range_m: 2.6
    under_target_hold_xy: true
    under_target_hold_yaw: true
    reacquire_sequence_enable: true
    reacquire_pan_phase_s: 2.0
    reacquire_tilt_phase_s: 2.5
    reacquire_yaw_phase_s: 8.0
    reacquire_pan_local_span_deg: 28.0
    reacquire_tilt_local_span_deg: 8.0
    reacquire_pan_rate_deg_s: 24.0
    reacquire_tilt_rate_deg_s: 22.0
    reacquire_yaw_rate_deg_s: 45.0
    reacquire_hold_phase_s: 1.5
    reacquire_fallback_hold_s: 30.0
    reacquire_hold_after_search: true
    reacquire_search_hold_xy: true
    reacquire_search_hold_yaw_before_yaw_phase: true
    reacquire_commit_enable: true
    reacquire_commit_s: 1.5
    reacquire_commit_quality_floor: 0.22
    reacquire_startup_guard_enable: true
    reacquire_first_lock_gate_enable: true
    reacquire_first_lock_min_visible_frames: 3
    reacquire_relock_min_visible_frames: 3
    reacquire_yaw_assist_delay_s: 4.0
    reacquire_xy_assist_delay_s: 7.0
    controller_profile_enable: true
    controller_profile_smooth_alpha: 0.85
    controller_profile_max_step_m_per_tick: 0.30
    controller_profile_cmd_xy_deadband_m: 0.08
    controller_profile_yaw_deadband_rad: 0.08
    controller_profile_min_cmd_period_s: 0.15
    leader_input_type: odom
    leader_pose_topic: /coord/leader_estimate
    tick_hz: 5.0
    d_target: 5.0
    d_max: 15.0
    z_alt: 7.0
    camera_pitch_deg: -70.0
    camera_z_offset_m: 0.27
    pose_timeout_s: 1.0
    min_cmd_period_s: 0.10
    smooth_alpha: 1.0
    max_step_m_per_tick: 0.7
    cmd_xy_deadband_m: 0.0
    max_yaw_step_rad_per_tick: 0.0
    leader_status_topic: /coord/leader_estimate_status
    quality_scale_enable: true
    quality_status_timeout_s: 3.0
    quality_conf_min: 0.15
    quality_conf_good: 0.65
    quality_latency_ref_ms: 180.0
    quality_min_step_scale: 0.25
    quality_hold_step_scale: 0.08
    quality_deadband_boost_m: 0.05
    state_machine_enable: true
    state_ok_debounce_ticks: 3
    state_bad_debounce_ticks: 3
    track_only_motion_enable: true
    track_only_allow_reacquire_motion: true
    track_only_hold_yaw_enable: true
    xy_motion_enable: true
    publish_debug_status: true
    debug_status_topic: /coord/follow_debug_status
    traj_enable: true
    traj_rel_frame_enable: true
    traj_rel_smooth_alpha: 0.35
    traj_pos_gain: 1.7
    traj_max_speed_mps: 1.8
    traj_max_accel_mps2: 3.0
    traj_quality_min_scale: 0.50
    traj_reset_on_yaw_jump_rad: 0.7
    yaw_deadband_rad: 0.05
    yaw_update_xy_gate_m: 0.0
    estimate_heading_from_motion_enable: true
    estimate_heading_alpha: 0.35
    estimate_heading_min_speed_mps: 0.15
    estimate_heading_max_dt_s: 1.0
    stale_predict_enable: true
    stale_predict_timeout_s: 6.0
    stale_predict_quality_floor: 0.2
    event_topic: /coord/events
    publish_events: true

ugv_motion_driver:
  ros__parameters:
    use_sim_time: true
    cmd_topic: /a201_0000/cmd_vel
    start_delay_s: 0.0
    ready_check_enable: true
    ready_require_cmd_subscriber: true
    ready_require_odom_flow: true
    ready_odom_topic: /a201_0000/platform/odom
    ready_timeout_s: 8.0
    ready_poll_hz: 10.0
    ready_settle_s: 0.25
    motion_profile: default
    turn_pattern: alternate
    forward_speed: 1.5
    forward_time_s: 0.75
    turn_speed: 1.9
    turn_time_s: 0.85
    cycles: 120
    pub_rate_hz: 12.0
    startup_pad_s: 0.7
    variation_enable: true
    variation_amplitude: 0.20
    pause_every_n: 0
    pause_time_s: 0.0
