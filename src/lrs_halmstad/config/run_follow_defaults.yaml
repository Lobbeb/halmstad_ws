/**:
  ros__parameters:
    camera_x_offset_m: 0.0    # Shared UAV->camera X offset in the UAV body frame (forward).
    camera_y_offset_m: 0.0     # Shared UAV->camera Y offset in the UAV body frame (left).
    camera_z_offset_m: 0.27     # Shared UAV->camera Z offset used by tilt geometry and detached camera pose.
    leader_look_target_x_m: 0.0  # Shared leader look target X offset in the leader body frame (forward).
    leader_look_target_y_m: 0.0  # Shared leader look target Y offset in the leader body frame (left).

follow_uav:
  ros__parameters:
    use_sim_time: true  # Run this node on Gazebo/ROS simulation time.

    event_topic: /coord/events  # Topic for follow lifecycle/debug event strings.__________________
                #<||  Leader input mode is selected by launch. The odom path runs the            ||:
                #<||  follow_uav_odom executable, and the estimate path runs follow_uav.         ||:
                #<||  Keep this YAML mode-agnostic so estimate launches do not inherit odom.     ||:
    #<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<||:
    publish_events: false  # Publish follow event strings on event_topic.

    d_max: 100.0  # Safety leash radius for the anchor target around the leader.
    d_target: 7.0  # Desired horizontal follow distance behind the leader.
    z_alt: 7.0    # Commanded UAV altitude / map Z used by the follow controller.
    manual_override_enable: false  # Stop follow-generated UAV commands so an external manual controller can steer.

    seed_uav_cmd_on_start: true      # Seed internal UAV command state from the startup pose before real pose arrives.
    startup_reposition_enable: false  # Before the first estimate arrives, move the UAV to the seeded startup pose.
    startup_reposition_tol_m: 0.25   # Consider the startup reposition complete when XY/Z are within this tolerance.
    startup_nudge_enable: false     # Send a one-shot XY nudge on startup to break deadlock if needed.
    uav_start_x: -2.0              # Startup/seeded UAV X position in map frame.
    uav_start_y: 0.0              # Startup/seeded UAV Y position in map frame.
    uav_start_yaw_deg: 0.0       # Startup/seeded UAV yaw in degrees.

    min_cmd_period_s: 0.05  # Minimum time between pose commands even if tick_hz is higher.
    pose_timeout_s: 3.0    # Treat leader/UAV pose data as stale after this many seconds.
    tick_hz: 20.0         # Main odom-follow control loop rate.

    cmd_xy_deadband_m: 0.02  # DONT TOUCH! Hold XY if the commanded move is smaller than this.
    follow_speed_mps: 5.0     # Hard cap on commanded XY follow speed.
    follow_speed_gain: 2.0     # Proportional XY speed gain from anchor-position error.
    follow_z_speed_mps: 8.0    # Hard cap on commanded vertical glide speed.
    follow_z_speed_gain: 3.0   # Proportional vertical speed gain from altitude error.
    follow_yaw_rate_rad_s: 3.0  # Max yaw rate cap; yaw_rate_rad_s / tick_hz = max rad step per tick.
    follow_yaw_rate_gain: 3.0  # Proportional yaw-rate gain; min(gain * yaw_error, yaw_rate_rad_s).
    follow_yaw_accel_rad_s2: 10.0  # Max yaw-rate acceleration so large heading jumps ramp quickly without jitter.
    follow_yaw_accel_boost_ref_rad: 0.5  # Yaw error at which the yaw acceleration boost reaches full strength.
    follow_yaw_accel_boost_max_scale: 2.0  # Max multiplier applied to yaw acceleration on large heading jumps.
    smooth_alpha: 1.0         # Target smoothing alpha; 1.0 = no XY smoothing.
    yaw_deadband_rad: 0.02    # DONT TOUCH! Hold yaw if the remaining yaw error is smaller than this.
    yaw_update_xy_gate_m: 0.0  # 0 disables it; otherwise yaw only updates when XY motion exceeds this.
    publish_debug_topics: true  # Publish /<uav>/follow/{target,actual,error,debug} topics.
    publish_pose_cmd_topics: true  # Publish legacy /<uav>/pose_cmd and /<uav>/pose_cmd/odom helper topics.
    
    #--------------------------------------------------!!These are kept here for the non-odom follow path. !!------------
    #-----------------<< Estimate/YOLO-follow only <<--------------------------------------------------------------------
    quality_conf_good: 0.35        # Confidence treated as "good" for full-quality response scaling.
    quality_conf_min: 0.15         # Confidence floor; at or below this the quality scale collapses.
    quality_deadband_boost_m: 0.04  # Extra XY deadband added as estimate quality drops.
    quality_hold_step_scale: 0.08  # Hold motion/yaw when quality scale falls to or below this.
    quality_latency_ref_ms: 500.0  # Reference latency used when reducing response for stale estimates.
    quality_min_step_scale: 0.30  # Minimum nonzero motion/yaw scale once quality is above zero.
    quality_scale_enable: true    # Enable leader-status-based motion scaling.
    quality_status_timeout_s: 3.0  # Treat leader status as stale after this timeout.

    #~~~~<< Debounce on follow-state transitions.
    state_bad_debounce_ticks: 2  # Bad ticks required before switching into degraded/hold states.
    state_machine_enable: true  # Debounce follow-state transitions instead of switching immediately.
    state_ok_debounce_ticks: 2  # Good ticks required before switching back into tracking.

    #~~~~<< Heading inference from leader motion.
    leader_actual_heading_enable: false  # Use shared UGV body heading for anchor placement while still following estimator XY.
    leader_actual_heading_topic: /a201_0000/amcl_pose_odom  # Shared AMCL-derived UGV pose used to read the true chassis heading for the anchor.
    estimate_heading_from_motion_enable: true  # In estimate-follow, prefer leader motion heading over noisy pose yaw when actual heading is unavailable.
    estimate_heading_alpha: 1.0  # EMA alpha for motion-derived heading/velocity.
    estimate_heading_max_dt_s: 1.0  # Ignore heading inference updates if pose gaps exceed this.
    estimate_heading_min_speed_mps: 0.15  # Minimum leader speed before motion-derived heading is trusted.

    #~~~~<< Trajectory shaping.
    traj_enable: true         # Enable velocity/acceleration-limited target shaping.
    traj_max_accel_mps2: 8.0   # Max XY acceleration inside the trajectory shaper.
    traj_max_speed_mps: 5.0     # Max XY speed inside the trajectory shaper.
    traj_error_boost_ref_m: 1.0  # Relative anchor jump at which XY speed/accel boost reaches full strength.
    traj_error_boost_max_scale: 3.0  # Max multiplier applied to XY speed/accel on large anchor jumps.
    traj_pos_gain: 1.6           # Position-to-velocity proportional gain in the trajectory shaper.
    traj_quality_min_scale: 0.40  # Lowest quality scale allowed inside trajectory shaping.
    traj_rel_frame_enable: true    # Shape the trajectory in the leader-relative frame instead of world frame.
    traj_rel_smooth_alpha: 1.0     # EMA alpha on the relative target before velocity shaping.
    traj_reset_on_yaw_jump_rad: 1.0  # Reset trajectory state if the leader yaw jumps more than this.
    #--------------------------------------------------------------------------------------------------------------------

#--------------<< Camera Tracker <<--------------------------------------------------------------------------------------
camera_tracker:
  ros__parameters:
    use_sim_time: true  #---------! Run this node on Gazebo/ROS simulation time. !---------------------------------------

    actual_pose_reacquire_enable: true  # When estimate pose is unavailable, use the shared leader actual pose only to re-aim the camera and recover detections.
    camera_look_target_z_m: 0.3  # DONT TOUCH! Vertical offset above the leader target point for pan/tilt solving.
    default_pan_deg: 0.0        # Fallback pan command when pan tracking is disabled or stale.
    default_tilt_deg: -45.0    # Fallback tilt command when tracking is disabled or stale.
    pan_enable: true          # Publish tracked pan commands instead of holding default_pan_deg.
    tilt_enable: true        # Publish tracked tilt commands instead of holding default_tilt_deg.
    tilt_deadband_deg: 0.5  # DONT TOUCH! Hold the previous tilt if the target changes less than this.
    image_center_correction_enable: true  # Add image-space centering correction on top of geometry-based pan/tilt.
    image_center_correction_timeout_s: 0.5  # Ignore stale detector/tracker boxes when centering in the image.
    image_center_deadband_deg: 0.5  # Ignore tiny image-angle errors to avoid camera chatter.
    pan_image_center_gain: 0.5  # Scale horizontal image-angle error into extra pan correction.
    pan_image_center_max_deg: 10.0  # Clamp image-based pan correction so it cannot dominate geometry pan.
    tilt_image_center_gain: 0.8  # Scale vertical image-angle error into extra tilt correction.
    tilt_image_center_max_deg: 10.0  # Clamp image-based tilt correction so it cannot dominate geometry tilt.
    trackable_hold_timeout_s: 8.0  # Keep using the last trackable leader pose across CPU-YOLO gaps.  Raised from 0.40.
    publish_debug_topics: true  # Publish /<uav>/camera/{target,debug}/* geometry and image-centering topics.
    pose_timeout_s: 3.0    # Treat leader/UAV pose data as stale after this many seconds.
    tick_hz: 20.0         # Camera pan/tilt update rate.

selected_target_filter:
  ros__parameters:
    use_sim_time: true  # Run the Step 3 trust/smoothing layer on Gazebo/ROS simulation time.

    in_topic: /coord/leader_selected_target  # Raw selected-target state published by the estimator.
    out_topic: /coord/leader_selected_target_filtered  # Filtered controller-facing selected target.
    status_topic: /coord/leader_selected_target_filtered_status  # Human-readable filter state/debug topic.
    publish_status: true  # Publish filter status for tuning and bag validation.

    tick_hz: 20.0  # Filter output/update rate.
    target_timeout_s: 12.0  # Treat the raw selected target as stale after this timeout.  Raised to match CPU-YOLO cadence.
    hold_timeout_s: 8.0  # Keep the filtered target alive across CPU-YOLO inference gaps.  Raised from 0.70.
    prediction_enable: true  # Allow a lightweight image-space predictive hold over short gaps.
    prediction_max_gap_s: 3.0  # Predict over CPU-YOLO-length target-loss gaps.  Raised from 0.35.
    max_predict_center_shift_px: 120.0  # Clamp the predictive image-center shift to avoid wild extrapolation.

    strong_confidence_threshold: 0.65  # Strong-confidence updates are accepted and smoothed normally.
    weak_confidence_threshold: 0.35  # Weak-confidence updates may still pass if continuity checks succeed.
    min_confidence_threshold: 0.12  # Lower-confidence updates below this are rejected outright.
    track_switch_min_confidence: 0.60  # Require stronger evidence before accepting a track switch.
    track_switch_min_age_s: 0.20  # Require a short minimum track age before switching tracks.

    same_track_center_jump_px_max: 140.0  # Reject same-track jumps that are too large in image space.
    track_switch_center_jump_px_max: 260.0  # Reject implausible track switches in image space.
    same_track_area_ratio_max: 2.5  # Reject same-track scale changes that are too abrupt.
    track_switch_area_ratio_max: 3.5  # Reject implausible track switches in scale/area.
    range_jump_max_m: 4.0  # Reject implausible projected-range jumps.
    hold_last_range_on_missing: true  # Preserve the last filtered projected range across short range dropouts.
    low_conf_reacquire_enable: true  # Allow a recent plausible low-confidence target to reacquire after a short dropout.
    low_conf_reacquire_timeout_s: 6.0  # Allow low-confidence reacquire over longer CPU-YOLO gaps.  Raised from 0.90.
    low_conf_reacquire_center_jump_px_max: 240.0  # Reject low-confidence reacquire if image-space jump is too large.
    low_conf_reacquire_area_ratio_max: 4.5  # Reject low-confidence reacquire if scale changes are too abrupt.
    low_conf_reacquire_range_jump_max_m: 6.0  # Reject low-confidence reacquire if projected range jumps too far.

    center_alpha_strong: 0.65  # Strong-confidence smoothing for bbox center.
    center_alpha_weak: 0.35  # Weak-confidence smoothing for bbox center.
    size_alpha_strong: 0.55  # Strong-confidence smoothing for bbox size/area.
    size_alpha_weak: 0.30  # Weak-confidence smoothing for bbox size/area.
    range_alpha_strong: 0.60  # Strong-confidence smoothing for projected range.
    range_alpha_weak: 0.30  # Weak-confidence smoothing for projected range.

visual_target_estimator:
  ros__parameters:
    use_sim_time: true  # Run the controller-facing target-state estimator on Gazebo/ROS simulation time.

    selected_target_topic: /coord/leader_selected_target_filtered  # Filtered target input from the Step 3 trust layer.
    camera_info_topic: /dji0/camera0/camera_info  # Camera intrinsics input used to lift image features into camera-relative geometry.
    out_topic: /coord/leader_visual_target_estimate  # Upgraded controller-facing relative-state estimate.
    status_topic: /coord/leader_visual_target_estimate_status  # Human-readable estimator state/debug topic.
    publish_status: true  # Publish readable estimator state/source/quality debug.

    tick_hz: 20.0  # Estimator update/publish rate.
    target_timeout_s: 12.0  # Treat the filtered selected target as stale after this timeout.  Raised to match CPU-YOLO cadence.
    prediction_max_gap_s: 5.0  # Coast on stale estimate across CPU-YOLO gaps.  Raised from 0.45.
    prefer_intrinsics_normalization: true  # Use fx/fy when available; otherwise fall back to image width/height.

    range_signal_mode: auto  # auto prefers projected range and falls back to area-derived pseudo-range.
    reference_range_m: 7.0  # Reference depth used for area-derived pseudo-range.
    reference_area_norm: 0.009  # Reference bbox area fraction paired with reference_range_m.
    min_area_norm_valid: 0.002  # Reject very small boxes before area-derived range is allowed.
    projected_range_min_m: 0.5  # Smallest projected range accepted into the upgraded estimate.
    projected_range_max_m: 25.0  # Largest projected range accepted into the upgraded estimate.
    auto_projected_reacquire_ticks: 3  # Require this many good projected-range samples before re-entering projected mode.
    auto_projected_loss_ticks: 4  # Require this many bad projected-range samples before dropping projected mode.

    position_alpha_projected: 0.65  # Alpha-beta position correction gain for projected-range measurements.
    position_alpha_area: 0.45  # Alpha-beta position correction gain for area-derived measurements.
    velocity_beta_projected: 0.35  # Alpha-beta velocity correction gain for projected-range measurements.
    velocity_beta_area: 0.18  # Alpha-beta velocity correction gain for area-derived measurements.
    max_velocity_mps: 8.0  # Clamp camera-relative target velocity estimates to a sane range.

follow_point_generator:
  ros__parameters:
    use_sim_time: true  # Run the follow-point generator on Gazebo/ROS simulation time.

    target_estimate_topic: /coord/leader_visual_target_estimate  # Estimator-backed target state input.
    target_pose_topic: /coord/leader_estimate  # World-frame target pose used to keep the follow point behind the UGV heading instead of orbiting its motion trace.
    prefer_target_pose_position: true  # Prefer the estimator's world-frame target XY so the follow point stays anchored behind the UGV instead of circling the camera projection.
    uav_pose_topic: /dji0/pose  # Current UAV pose used to keep the follow point in the right frame and altitude.
    camera_pose_topic: /dji0/camera/actual/center_pose  # Actual camera-center pose used to project the relative estimate into world XY.
    out_topic: /coord/leader_follow_point  # World-frame spatial follow goal for the bridge.
    status_topic: /coord/leader_follow_point_status  # Human-readable follow-point generator state/debug topic.
    publish_status: true  # Publish readable follow-point state for tuning and validation.

    tick_hz: 20.0  # Follow-point update rate.
    target_estimate_timeout_s: 12.0  # Treat the estimator-backed target state as stale after this timeout.  Raised to match CPU-YOLO cadence.
    uav_pose_timeout_s: 0.5  # Treat UAV pose as stale after this timeout.
    camera_pose_timeout_s: 0.5  # Treat camera pose as stale after this timeout.
    hold_timeout_s: 8.0  # Hold the last valid follow point across CPU-YOLO inference gaps.  Raised from 0.50.

    follow_distance_m: 7.0  # Nominal standoff distance behind the target.
    lateral_offset_m: 0.0  # Optional lateral offset from the target motion/view line.
    lookahead_horizon_s: 0.15  # Keep the behind-target point slightly predictive without pulling too far ahead.
    min_target_speed_mps: 0.25  # Fall back to target-motion heading above this speed when no fresh target-pose heading is available.
    prefer_target_pose_heading: true  # Prefer the estimator's world-frame target yaw so the UAV shadows the UGV from behind instead of circling it.
    target_pose_timeout_s: 8.0  # Treat the target-pose heading as stale after this timeout.  Raised from 0.75 for CPU-YOLO cadence.
    heading_dir_alpha: 0.25  # Smooth changes in the chosen behind-heading so turns stay steady.
    heading_hold_timeout_s: 8.0  # Preserve the last good behind-heading across CPU-YOLO gaps.  Raised from 1.0.
    target_velocity_alpha: 0.35  # EMA alpha for world-frame target velocity estimation.
    point_alpha: 0.35  # Smooth the generated follow point more heavily for slower shadow-follow behavior.
    max_follow_point_jump_m: 1.0  # Keep follow-point jumps smaller so the UAV does not lunge across the target.
    use_current_altitude: true  # Keep the follow point at the UAV's current altitude by default.
    fixed_z_m: 7.0  # Fallback altitude if use_current_altitude is disabled.
    camera_x_offset_m: 0.0  # Camera X offset fallback used when deriving camera pose from UAV pose.
    camera_y_offset_m: 0.0  # Camera Y offset fallback used when deriving camera pose from UAV pose.

follow_point_planner:
  ros__parameters:
    use_sim_time: true  # Run the planner stage on Gazebo/ROS simulation time.

    follow_point_topic: /coord/leader_follow_point  # Raw spatial follow goal from the follow-point generator.
    uav_pose_topic: /dji0/pose  # Current UAV pose used to seed and validate the planned target.
    out_topic: /coord/leader_planned_target  # Planned pose target consumed by the bridge in planner mode.
    status_topic: /coord/leader_planned_target_status  # Human-readable planner state/debug topic.
    publish_status: true  # Publish readable planner state for tuning and validation.

    tick_hz: 20.0  # Planner update rate.
    follow_point_timeout_s: 12.0  # Treat the raw follow point as stale after this timeout.  Raised for CPU-YOLO cadence.
    pose_timeout_s: 0.5  # Treat UAV pose as stale after this timeout.
    hold_timeout_s: 8.0  # Hold the last planned target across CPU-YOLO inference gaps.  Raised from 0.5.

    xy_alpha: 0.30  # Move more conservatively toward each follow point for a steadier shadow-follow path.
    yaw_alpha: 0.40  # Turn more gradually toward the follow-point yaw.
    max_planned_step_m: 0.25  # Keep each planner update to a small XY target jump.
    max_planned_yaw_step_rad: 0.08  # Keep each planner update to a small yaw jump.
    seed_from_uav_pose: true  # Start the planner from the current UAV pose instead of teleporting to the raw follow point.
    use_follow_point_altitude: true  # Preserve the follow-point altitude policy.
    fixed_z_m: 7.0  # Fallback altitude if the follow point lacks a finite Z value.

visual_follow_controller:
  ros__parameters:
    use_sim_time: true  # Run this optional test controller on Gazebo/ROS simulation time.

    selected_target_topic: /coord/leader_selected_target_filtered  # Filtered controller-facing selected target from the Step 3 trust layer.
    target_estimate_topic: /coord/leader_visual_target_estimate  # Upgraded camera-relative target estimate preferred by the controller.
    out_topic: /coord/leader_visual_control  # Proposed test-mode visual-follow command output.
    status_topic: /coord/leader_visual_control_status  # Human-readable mirror of the controller state.
    debug_image_topic: /coord/leader_visual_control_debug_image  # Visual-follow debug overlay image.
    publish_status: true  # Publish the readable status line alongside the structured test command.
    publish_debug_topics: true  # Publish numeric controller debug topics under out_topic/debug/*.
    publish_debug_image: true  # Publish the controller's own debug image overlay.

    tick_hz: 20.0  # Visual-control output loop rate.
    target_timeout_s: 1.0  # Treat the selected target state as stale after this timeout.
    target_estimate_timeout_s: 1.0  # Treat the upgraded estimate as stale after this timeout.
    prefer_target_estimate: true  # Prefer the upgraded camera-relative estimate and fall back to filtered target geometry only if needed.
    loss_hold_timeout_s: 0.50  # Briefly hold and decay the last valid command across short target loss.
    distance_signal_mode: auto  # auto prefers projected range, range forces projected range, area forces bbox/OBB area proxy.
    prefer_intrinsics_normalization: true  # Use fx/fy when camera intrinsics are available; otherwise fall back to image size.

    target_range_m: 7.0  # Preferred follow distance when projected non-const range is available.
    target_area_norm: 0.009  # Area fallback target as a fraction of the image when projected range is unavailable.
    yaw_gain: 5.0  # Convert normalized horizontal image error into yaw-rate command.
    forward_range_gain: 0.75  # Convert projected-range error into forward/back speed.
    forward_area_gain: 5.0  # Convert sqrt(area) proxy error into forward/back speed.
    yaw_error_deadband_norm: 0.003  # Ignore tiny horizontal image errors near the desired center.
    range_error_deadband_m: 0.25  # Ignore tiny projected-range errors near the target distance.
    area_error_deadband_norm: 0.015  # Ignore tiny bbox-area proxy errors near the target area.
    min_area_norm_valid: 0.002  # Reject very tiny image areas before area-mode control is allowed.
    range_valid_min_m: 0.5  # Smallest projected range accepted by the controller.
    range_valid_max_m: 25.0  # Largest projected range accepted by the controller.
    auto_range_reacquire_ticks: 3  # Require this many consecutive valid range samples before switching back from area mode.
    auto_range_loss_ticks: 4  # Require this many consecutive bad range samples before dropping range mode.
    yaw_rate_max_rad_s: 1.0  # Clamp the yaw-rate command from image-space steering.
    forward_speed_max_mps: 1.0  # Clamp the forward/back speed command.
    yaw_slew_rate_rad_s2: 3.0  # Slew limit for yaw-rate command changes.
    forward_slew_rate_mps2: 2.0  # Slew limit for forward-speed command changes.
    yaw_release_rate_rad_s2: 6.0  # Let yaw-rate decay faster than it ramps up when tracking quality drops.
    forward_release_rate_mps2: 4.0  # Let forward speed decay faster than it ramps up on short loss/no-distance cases.

visual_actuation_bridge:
  ros__parameters:
    use_sim_time: true  # Run the optional bridge on Gazebo/ROS simulation time.

    input_mode: auto  # auto uses planned_target, then follow_point, and otherwise holds; explicit control mode is required for raw controller fallback.
    visual_control_topic: /coord/leader_visual_control  # Input from the visual-follow controller.
    follow_point_topic: /coord/leader_follow_point  # Input from the follow-point generator when input_mode:=follow_point.
    planned_target_topic: /coord/leader_planned_target  # Input from the planner stage when input_mode:=planned_target.
    uav_pose_topic: ""  # Defaults to /<uav>/pose when left empty.
    out_topic: ""  # Defaults to /<uav>/psdk_ros2/flight_control_setpoint_ENUposition_yaw when left empty.
    pose_cmd_topic: ""  # Defaults to /<uav>/pose_cmd when left empty.
    status_topic: /coord/leader_visual_actuation_bridge_status  # Human-readable bridge state/debug topic.

    tick_hz: 20.0  # Bridge update rate.
    control_timeout_s: 12.0  # Treat controller output as stale after this timeout and hold position.  Raised for CPU-YOLO cadence.
    follow_point_timeout_s: 12.0  # Treat the follow point as stale after this timeout and hold the current pose.  Raised for CPU-YOLO cadence.
    planned_target_timeout_s: 12.0  # Treat the planned target as stale after this timeout and hold the current pose.  Raised for CPU-YOLO cadence.
    pose_timeout_s: 0.5  # Treat UAV pose as stale after this timeout and stop bridging.
    forward_scale: 1.0  # Optional tuning scale applied to controller forward speed before conversion.
    yaw_scale: 1.0  # Optional tuning scale applied to controller yaw rate before conversion.
    max_xy_step_m: 0.12  # Keep bridge motion slow and bounded so the UAV shadows instead of surging ahead.
    max_yaw_step_rad: 0.12  # Keep bridge yaw changes bounded for smoother turning behind the UGV.
    publish_pose_cmd_mirror: true  # Publish the /<uav>/pose_cmd mirror path while bridge mode owns actuation.
    use_current_altitude: true  # Hold the current UAV altitude during bridge mode.
    fixed_z_m: 7.0  # Fallback altitude if use_current_altitude is disabled.

leader_detector:
  ros__parameters:
    use_sim_time: true  # Run the detector on Gazebo/ROS simulation time.

    event_topic: /coord/events    # Topic for detector lifecycle/debug event strings.
    out_topic: /coord/leader_detection  # Best-detection topic consumed by leader_estimator.
    status_topic: /coord/leader_detection_status  # Detector-owned status/debug topic for detection state and track metadata.
    publish_events: true         # Publish detector lifecycle/debug events on event_topic.

    device: cpu             # YOLO inference device, e.g. cpu or cuda.
    imgsz: 640               # YOLO inference image size.
    predict_hz: 20.0         # Max detector publish rate; incoming images above this are skipped.

    conf_threshold: 0.3  # Minimum YOLO detection confidence to consider.
    target_class_id: -1   # Restrict detections to one YOLO class id; -1 means any class.
    target_class_name: ""  # Optional class-name filter; empty means any class name.

    bbox_continuity_class_bonus: 0.0  # Bonus when the candidate class matches the previously latched detection.
    bbox_continuity_max_px: 180.0     # Pixel jump at which continuity scoring becomes a hard penalty.
    bbox_continuity_weight: 0.10      # Penalty weight for detection-center jumps between frames.

leader_tracker:
  ros__parameters:
    use_sim_time: true  # Run the tracker on Gazebo/ROS simulation time.

    event_topic: /coord/events    # Topic for tracker lifecycle/debug event strings.
    out_topic: /coord/leader_detection  # Best tracked detection topic consumed by leader_estimator.
    status_topic: /coord/leader_detection_status  # Tracker-owned status/debug topic for detection state and track metadata.
    publish_events: true         # Publish tracker lifecycle/debug events on event_topic.

    device: cpu             # Ultralytics tracking device, e.g. cpu or cuda.
    imgsz: 640              # Tracking inference image size.
    predict_hz: 20.0        # Max tracking publish rate; incoming images above this are skipped.
    tracker_config: bytetrack.yaml  # Tracker config filename under config/trackers or an absolute path.

    conf_threshold: 0.12  # Minimum detection confidence accepted by the tracker.
    iou_threshold: 0.45   # IOU threshold passed into Ultralytics track().
    target_class_id: -1   # Restrict tracked detections to one YOLO class id; -1 means any class.
    target_class_name: ""  # Optional class-name filter; empty means any class name.

leader_estimator:
  ros__parameters:
    use_sim_time: true  # Run this node on Gazebo/ROS simulation time.

    estimate_error_topic: /coord/leader_estimate_error  # Debug topic publishing estimate-vs-truth error.
    event_topic: /coord/events  # Topic for estimator lifecycle/debug event strings.
    external_detection_timeout_s: 10.0  # Treat detector/tracker output as stale after this timeout.  Raised from 1.0 to bridge CPU-YOLO inference gaps (~4-10 s between frames).
    external_detection_topic: /coord/leader_detection  # Detection topic carrying bbox/OBB JSON from detector/tracker.
    external_detection_status_topic: /coord/leader_detection_status  # Detector/tracker status topic used only for estimator debug-image overlay.
    selected_target_topic: /coord/leader_selected_target  # Clean selected-target topic for the visual-follow controller.
    camera_tilt_topic: ""  # Defaults to /<uav>/follow/actual/tilt_deg when left empty.
    camera_world_yaw_topic: ""  # Defaults to /<uav>/camera/actual/world_yaw_rad when left empty.
    leader_actual_pose_enable: true  # Enable optional truth/diagnostic leader pose input.
    leader_actual_pose_timeout_s: 2.0  # Treat truth pose as stale after this timeout.
    leader_actual_pose_topic: /a201_0000/amcl_pose_odom  # Optional truth leader pose used only for diagnostics/testing.
    out_topic: /coord/leader_estimate  # Published leader pose estimate topic.
    publish_debug_image: true  # Publish a diagnostic overlay image.
    publish_events: true  # Publish estimator lifecycle/debug events on event_topic.
    publish_fault_status: true  # Publish fault/state transitions on fault_status_topic.
    publish_selected_target: true  # Publish the selected target as a controller-facing structured topic.
    publish_status: true  # Publish status strings with state/confidence/latency.
    status_topic: /coord/leader_estimate_status  # Status topic consumed by estimate-follow.
    fault_status_topic: /coord/leader_estimate_fault  # Latched estimator fault topic.
    debug_image_topic: /coord/leader_debug_image  # Estimator debug image topic.

    cam_pitch_offset_deg: 0.0  # Camera pitch mounting offset used in bearing/range projection.
    cam_roll_offset_deg: 0.0  # Camera roll mounting offset reserved for future geometry work.
    cam_x_offset_m: 0.0  # Camera X offset in the UAV body frame.
    cam_y_offset_m: 0.0  # Camera Y offset in the UAV body frame.
    cam_yaw_offset_deg: 0.0  # Camera yaw mounting offset used in bearing projection.
    cam_z_offset_m: 0.0  # Camera Z offset relative to the UAV body frame.
    image_timeout_s: 1.0  # Treat camera images as stale after this timeout.
    uav_pose_timeout_s: 1.0  # Treat UAV pose as stale after this timeout.
    camera_orientation_timeout_s: 1.0  # Treat live camera tilt/yaw topics as stale after this timeout and fall back to static offsets.

    est_hz: 20.0  # Main estimator loop rate.

    constant_range_m: 7.0  # Fixed fallback range when range_mode does not provide depth/ground range.
    depth_max_m: 100.0  # Maximum valid depth sample.
    depth_min_m: 0.2  # Minimum valid depth sample.
    depth_scale: 0.001  # Scale factor for 16UC1 depth images.
    ground_max_range_m: 50.0  # Maximum ground-plane intersection range accepted as valid.
    ground_min_range_m: 0.25  # Minimum ground-plane intersection range accepted as valid; keep this low enough for the UGV to pass under the UAV without forcing const fallback.
    range_mode: auto  # Range source: auto, depth, ground, or const.
    target_ground_z_m: 0.0  # World Z of the target/ground plane used by ground-range projection.
    use_depth_range: true  # Allow depth to override constant range when available.

ugv_nav2_driver:
  ros__parameters:
    use_sim_time: true  # Run this node on Gazebo/ROS simulation time.

    continue_on_goal_failure: true      # Move on to the next goal instead of stopping the whole sequence.
    path_topic: planned_path             # Debug path topic for the generated/sent Nav2 route.
    pose_topic: amcl_pose                 # Localization topic used to read the UGV pose.
    pose_topic_type: pose_with_covariance  # Message type on pose_topic: pose_with_covariance or odom.

    initial_pose_covariance_xy: 0.25   # Covariance placed in X/Y when auto-publishing initialpose.
    initial_pose_covariance_yaw: 0.068  # Covariance placed in yaw when auto-publishing initialpose.
    initial_pose_frame_id: map         # Frame id used for the auto-published initial pose.
    initial_pose_publish_hz: 1.0      # Repeat rate while trying to seed localization with initialpose.
    initial_pose_skip_wait_s: 0.5    # Wait this long for existing localization before publishing initialpose.
    initial_pose_timeout_s: 15.0    # Give up auto-setting the initial pose after this timeout.
    initial_pose_topic: initialpose  # Topic used to publish the AMCL/Nav2 initial pose.
    initial_pose_x: 0.0             # Initial pose X used for localization bootstrap.
    initial_pose_y: 0.0            # Initial pose Y used for localization bootstrap.
    initial_pose_yaw_deg: 0.0      # Initial pose yaw in degrees used for localization bootstrap.
    set_initial_pose_enable: true   # Auto-publish an initial pose at startup if localization is not ready yet.

    goal_action_name: navigate_to_pose    # Nav2 action name to call for goal execution.
    goal_frame_id: map                     # Frame used for generated/supplied goals.
    goal_reject_retry_count: 20             # Retries after a goal is rejected by the Nav2 action server.
    goal_reject_retry_delay_s: 1.0           # Delay between goal-rejection retries.
    goal_result_timeout_s: 600.0              # Cancel a goal if Nav2 has not returned a result within this timeout.
    goal_sequence_csv: ""                      # Optional inline waypoint list: x,y,yaw_deg;x,y,yaw_deg;...
    goal_sequence_file: ""                      # Optional waypoint file; when set, goals are loaded from here.
    goal_sequence_random_reverse: true           # Allow random reversal of the loaded waypoint order.
    goal_sequence_randomize: true                 # Randomize the loaded waypoint order using goal_sequence_seed.
    goal_sequence_relative_to_current_pose: false  # Treat explicit waypoints as offsets from the current pose.
    goal_sequence_seed: -1                        # RNG seed for waypoint randomization; -1 uses a time-based seed.
    goal_server_timeout_s: 90.0                  # Timeout while waiting for the Nav2 action server.
    goal_start_delay_s: 25.0                    # Delay before the first goal so Nav2/TF/costmaps can settle.
    min_goal_xy_delta_m: 0.05                  # Skip a goal if it is too close in XY to the current pose.
    min_goal_yaw_delta_deg: 2.0               # Skip a goal if it is too close in yaw to the current pose.
    pause_after_goal_s: 0.0                  # Dwell time after each completed goal.

    cycles: 40          # Number of motion-profile cycles when generating a route internally.
    forward_speed: 0.75  # Forward speed for generated motion-profile segments.
    forward_time_s: 0.90  # Duration of each generated forward segment.
    motion_profile: route  # Named motion profile used when generating internal waypoints.
    pause_every_n: 0       # Insert a pause after every N generated segments; 0 disables it.
    pause_time_s: 0.0       # Length of inserted generated-profile pauses.
    turn_pattern: alternate  # Left/right turn pattern for generated routes.
    turn_speed: 0.55         # Angular speed for generated turns.
    turn_time_s: 0.65         # Duration of generated turns.
    variation_amplitude: 0.08  # Random variation magnitude for generated routes.
    variation_enable: false   # Enable random variation in the generated route.

    pose_stale_timeout_s: 2.0  # Reject localization poses that have not been received recently enough.
    pose_timeout_s: 10.0      # Timeout while waiting for the first/current localization pose.
    start_delay_s: 0.0       # Delay before starting route generation and Nav2 goal handling.
