/**:
  ros__parameters:
    camera_x_offset_m: 0.0    # Shared UAV->camera X offset in the UAV body frame (forward).
    camera_y_offset_m: 0.0     # Shared UAV->camera Y offset in the UAV body frame (left).
    camera_z_offset_m: 0.27     # Shared UAV->camera Z offset used by tilt geometry and detached camera pose.
    leader_look_target_x_m: 0.0  # Shared leader look target X offset in the leader body frame (forward).
    leader_look_target_y_m: 0.0  # Shared leader look target Y offset in the leader body frame (left).

follow_uav:
  ros__parameters:
    use_sim_time: true  # Run this node on Gazebo/ROS simulation time.

    event_topic: /coord/events  # Topic for follow lifecycle/debug event strings.__________________
                #<||  Leader input mode is selected by launch. The odom path runs the             ||:
                #<||  follow_uav_odom executable, and the estimate path runs follow_uav.         ||:
                #<||  Keep this YAML mode-agnostic so estimate launches do not inherit odom.     ||:
    #<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<||:
    publish_events: false  # Publish follow event strings on event_topic.

    d_max: 100.0  # Safety leash radius for the anchor target around the leader.
    d_target: 7.0  # Desired horizontal follow distance behind the leader.
    z_alt: 7.0    # Commanded UAV altitude / map Z used by the follow controller.
    manual_override_enable: false  # Stop follow-generated UAV commands so an external manual controller can steer.

    seed_uav_cmd_on_start: true  # Seed internal UAV command state from the startup pose before real pose arrives.
    startup_reposition_enable: false  # Before the first estimate arrives, move the UAV to the seeded startup pose.
    startup_reposition_tol_m: 0.25  # Consider the startup reposition complete when XY/Z are within this tolerance.
    startup_nudge_enable: false  # Send a one-shot XY nudge on startup to break deadlock if needed.
    uav_start_x: -2.0           # Startup/seeded UAV X position in map frame.
    uav_start_y: 0.0           # Startup/seeded UAV Y position in map frame.
    uav_start_yaw_deg: 0.0    # Startup/seeded UAV yaw in degrees.

    min_cmd_period_s: 0.05  # Minimum time between pose commands even if tick_hz is higher.
    pose_timeout_s: 3.0    # Treat leader/UAV pose data as stale after this many seconds.
    tick_hz: 20.0         # Main odom-follow control loop rate.

    cmd_xy_deadband_m: 0.02  # DONT TOUCH! Hold XY if the commanded move is smaller than this.
    follow_speed_mps: 5.0     # Hard cap on commanded XY follow speed.
    follow_speed_gain: 2.0     # Proportional XY speed gain from anchor-position error.
    follow_z_speed_mps: 8.0    # Hard cap on commanded vertical glide speed.
    follow_z_speed_gain: 3.0   # Proportional vertical speed gain from altitude error.
    follow_yaw_rate_rad_s: 3.0  # Max yaw rate cap; yaw_rate_rad_s / tick_hz = max rad step per tick.
    follow_yaw_rate_gain: 2.0  # Proportional yaw-rate gain; min(gain * yaw_error, yaw_rate_rad_s).
    smooth_alpha: 1.0         # Target smoothing alpha; 1.0 = no XY smoothing.
    yaw_deadband_rad: 0.02    # DONT TOUCH! Hold yaw if the remaining yaw error is smaller than this.
    yaw_update_xy_gate_m: 0.0  # 0 disables it; otherwise yaw only updates when XY motion exceeds this.
    
    #--------------------------------------------------!!These are kept here for the non-odom follow path. !!------------
    #-----------------<< Estimate/YOLO-follow only <<--------------------------------------------------------------------
    quality_conf_good: 0.35        # Confidence treated as "good" for full-quality response scaling.
    quality_conf_min: 0.15         # Confidence floor; at or below this the quality scale collapses.
    quality_deadband_boost_m: 0.04  # Extra XY deadband added as estimate quality drops.
    quality_hold_step_scale: 0.08  # Hold motion/yaw when quality scale falls to or below this.
    quality_latency_ref_ms: 500.0  # Reference latency used when reducing response for stale estimates.
    quality_min_step_scale: 0.30  # Minimum nonzero motion/yaw scale once quality is above zero.
    quality_scale_enable: true    # Enable leader-status-based motion scaling.
    quality_status_timeout_s: 3.0  # Treat leader status as stale after this timeout.

    #~~~~<< Debounce on follow-state transitions.
    state_bad_debounce_ticks: 2  # Bad ticks required before switching into degraded/hold states.
    state_machine_enable: true  # Debounce follow-state transitions instead of switching immediately.
    state_ok_debounce_ticks: 2  # Good ticks required before switching back into tracking.

    #~~~~<< Heading inference from leader motion.
    estimate_heading_from_motion_enable: true  # Infer leader heading from motion instead of trusting pose yaw.
    estimate_heading_alpha: 1.0  # EMA alpha for motion-derived heading/velocity.
    estimate_heading_max_dt_s: 1.0  # Ignore heading inference updates if pose gaps exceed this.
    estimate_heading_min_speed_mps: 1.0  # Minimum leader speed before motion-derived heading is trusted.

    #~~~~<< Trajectory shaping.
    traj_enable: true         # Enable velocity/acceleration-limited target shaping.
    traj_max_accel_mps2: 3.0   # Max XY acceleration inside the trajectory shaper.
    traj_max_speed_mps: 2.0     # Max XY speed inside the trajectory shaper.
    traj_pos_gain: 1.6           # Position-to-velocity proportional gain in the trajectory shaper.
    traj_quality_min_scale: 0.40  # Lowest quality scale allowed inside trajectory shaping.
    traj_rel_frame_enable: true    # Shape the trajectory in the leader-relative frame instead of world frame.
    traj_rel_smooth_alpha: 0.30     # EMA alpha on the relative target before velocity shaping.
    traj_reset_on_yaw_jump_rad: 0.7  # Reset trajectory state if the leader yaw jumps more than this.
    #--------------------------------------------------------------------------------------------------------------------

#--------------<< Camera Tracker <<--------------------------------------------------------------------------------------
camera_tracker:
  ros__parameters:
    use_sim_time: true  #---------! Run this node on Gazebo/ROS simulation time. !---------------------------------------

    camera_look_target_z_m: 0.3  # DONT TOUCH! Vertical offset above the leader target point for pan/tilt solving.
    default_pan_deg: 0.0        # Fallback pan command when pan tracking is disabled or stale.
    default_tilt_deg: -45.0    # Fallback tilt command when tracking is disabled or stale.
    pan_enable: false          # Publish tracked pan commands instead of holding default_pan_deg.
    tilt_enable: false        # Publish tracked tilt commands instead of holding default_tilt_deg.
    tilt_deadband_deg: 0.5  # DONT TOUCH! Hold the previous tilt if the target changes less than this.
    pose_timeout_s: 3.0    # Treat leader/UAV pose data as stale after this many seconds.
    tick_hz: 20.0         # Camera pan/tilt update rate.

leader_estimator:
  ros__parameters:
    use_sim_time: true  # -------------------!! Run this node on Gazebo/ROS simulation time. !!--------------------------

    estimate_error_topic: /coord/leader_estimate_error  # Debug topic publishing estimate-vs-truth error.
    event_topic: /coord/events                         # Topic for estimator lifecycle/debug event strings.
    leader_actual_pose_enable: true                    # Enable optional truth/diagnostic leader pose input.
    leader_actual_pose_topic: /a201_0000/amcl_pose_odom  # Optional truth leader pose used only for diagnostics/testing.
    out_topic: /coord/leader_estimate                  # Published leader pose estimate topic.
    publish_events: false                             # Publish estimator lifecycle/debug events on event_topic.
    publish_status: true                             # Publish status strings with state/confidence/latency.
    status_topic: /coord/leader_estimate_status     # Status topic consumed by estimate-follow.

    cam_pitch_offset_deg: 0.0  # Camera pitch mounting offset used in bearing/range projection.
    cam_yaw_offset_deg: 0.0   # Camera yaw mounting offset used in bearing projection.
    image_timeout_s: 1.0     # Reject camera images older than this.
    uav_pose_timeout_s: 1.0  # Reject UAV pose data older than this.

    device: cpu             # YOLO inference device, e.g. cpu or cuda.
    est_hz: 20.0             # Main estimator loop rate.
    imgsz: 640                # YOLO inference image size.
    latency_comp_enable: true  # Predict the tracked estimate forward to compensate for detection latency.

    conf_threshold: 0.12  # Minimum YOLO detection confidence to consider.
    target_class_id: 0   # Restrict detections to one YOLO class id; -1 means any class.
    target_class_name: "ugv"  # Optional class-name filter; empty means any class name.

    constant_range_m: 7.0    # Fixed fallback range when range_mode does not provide depth/ground range.
    ground_max_range_m: 50.0  # Maximum ground-plane intersection range accepted as valid.
    ground_min_range_m: 2.0  # Minimum ground-plane intersection range accepted as valid.
    range_mode: auto       # Range source: auto, depth, ground, or const.
    target_ground_z_m: 0.0    # World Z of the target/ground plane used by ground-range projection.

    bad_debounce_frames: 1            # Consecutive bad frames required before switching to hold/reject states.
    bbox_continuity_class_bonus: 0.10  # Bonus when the candidate class matches the previously latched detection.
    bbox_continuity_max_px: 1000.0     # Pixel jump at which continuity scoring becomes a hard penalty.
    bbox_continuity_weight: 0.05     # Penalty weight for detection-center jumps between frames.
    max_bearing_jump_deg: 180.0    # Reject detections that imply an implausibly large bearing jump between frames.
    max_hold_frames: 0             # Disable held-estimate reuse; missing/rejected detections drop out immediately.
    max_hold_s: 0.0               # Disable held-estimate reuse by time as well.
    max_target_speed_mps: 20.0   # Reject detections that imply the target moved faster than this.
    max_xy_jump_m: 20.0         # Reject detections that jump too far in world XY in one update.
    ok_debounce_frames: 1      # Good frames required before latching/reacquiring a target.
    tracker_enable: true     # Enable the alpha-beta tracker on the world-frame estimate.
    smooth_alpha: 0.5        # EMA alpha on bearing/range before world projection.
    xy_smooth_alpha: 0.8    # EMA alpha on the projected world XY estimate.

ugv_nav2_driver:
  ros__parameters:
    use_sim_time: true  # Run this node on Gazebo/ROS simulation time.

    continue_on_goal_failure: true      # Move on to the next goal instead of stopping the whole sequence.
    path_topic: planned_path             # Debug path topic for the generated/sent Nav2 route.
    pose_topic: amcl_pose                 # Localization topic used to read the UGV pose.
    pose_topic_type: pose_with_covariance  # Message type on pose_topic: pose_with_covariance or odom.

    initial_pose_covariance_xy: 0.25   # Covariance placed in X/Y when auto-publishing initialpose.
    initial_pose_covariance_yaw: 0.068  # Covariance placed in yaw when auto-publishing initialpose.
    initial_pose_frame_id: map         # Frame id used for the auto-published initial pose.
    initial_pose_publish_hz: 1.0      # Repeat rate while trying to seed localization with initialpose.
    initial_pose_skip_wait_s: 0.5    # Wait this long for existing localization before publishing initialpose.
    initial_pose_timeout_s: 15.0    # Give up auto-setting the initial pose after this timeout.
    initial_pose_topic: initialpose  # Topic used to publish the AMCL/Nav2 initial pose.
    initial_pose_x: 0.0             # Initial pose X used for localization bootstrap.
    initial_pose_y: 0.0            # Initial pose Y used for localization bootstrap.
    initial_pose_yaw_deg: 0.0      # Initial pose yaw in degrees used for localization bootstrap.
    set_initial_pose_enable: true   # Auto-publish an initial pose at startup if localization is not ready yet.

    goal_action_name: navigate_to_pose    # Nav2 action name to call for goal execution.
    goal_frame_id: map                     # Frame used for generated/supplied goals.
    goal_reject_retry_count: 5              # Retries after a goal is rejected by the Nav2 action server.
    goal_reject_retry_delay_s: 1.0           # Delay between goal-rejection retries.
    goal_result_timeout_s: 600.0              # Cancel a goal if Nav2 has not returned a result within this timeout.
    goal_sequence_csv: ""                      # Optional inline waypoint list: x,y,yaw_deg;x,y,yaw_deg;...
    goal_sequence_file: ""                      # Optional waypoint file; when set, goals are loaded from here.
    goal_sequence_random_reverse: true           # Allow random reversal of the loaded waypoint order.
    goal_sequence_randomize: true                 # Randomize the loaded waypoint order using goal_sequence_seed.
    goal_sequence_relative_to_current_pose: false  # Treat explicit waypoints as offsets from the current pose.
    goal_sequence_seed: -1                        # RNG seed for waypoint randomization; -1 uses a time-based seed.
    goal_server_timeout_s: 20.0                  # Timeout while waiting for the Nav2 action server.
    goal_start_delay_s: 2.0                     # Delay before the first goal so Nav2/TF/costmaps can settle.
    min_goal_xy_delta_m: 0.05                  # Skip a goal if it is too close in XY to the current pose.
    min_goal_yaw_delta_deg: 2.0               # Skip a goal if it is too close in yaw to the current pose.
    pause_after_goal_s: 0.0                  # Dwell time after each completed goal.

    cycles: 2           # Number of motion-profile cycles when generating a route internally.
    forward_speed: 0.75  # Forward speed for generated motion-profile segments.
    forward_time_s: 0.90  # Duration of each generated forward segment.
    motion_profile: route  # Named motion profile used when generating internal waypoints.
    pause_every_n: 0       # Insert a pause after every N generated segments; 0 disables it.
    pause_time_s: 0.0       # Length of inserted generated-profile pauses.
    turn_pattern: alternate  # Left/right turn pattern for generated routes.
    turn_speed: 0.55         # Angular speed for generated turns.
    turn_time_s: 0.65         # Duration of generated turns.
    variation_amplitude: 0.08  # Random variation magnitude for generated routes.
    variation_enable: false   # Enable random variation in the generated route.

    pose_stale_timeout_s: 2.0  # Reject localization poses that have not been received recently enough.
    pose_timeout_s: 10.0      # Timeout while waiting for the first/current localization pose.
    start_delay_s: 0.0       # Delay before starting route generation and Nav2 goal handling.
